name: AyuGram IPA

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number (optional, auto if empty)"
        required: false
        type: string
      source_branch:
        description: "Branch to build (optional)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-ipa:
    runs-on: macos-26
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ inputs.source_branch != '' && inputs.source_branch || github.ref }}

      - name: Materialize submodule directories
        shell: bash
        run: |
          set -euo pipefail

          # This fork was initialized from a local copy, so gitlink metadata may be missing.
          # Recreate submodule directories from .gitmodules to keep Bazel paths valid.
          resolve_url() {
            case "$1" in
              ../rlottie.git) echo "https://github.com/TelegramMessenger/rlottie.git" ;;
              ../tgcalls.git) echo "https://github.com/TelegramMessenger/tgcalls.git" ;;
              *) echo "$1" ;;
            esac
          }

          if [ ! -f .gitmodules ]; then
            echo "No .gitmodules found, skipping."
            exit 0
          fi

          while read -r key path; do
            module="${key%.path}"
            url="$(git config -f .gitmodules --get "${module}.url" || true)"
            if [ -z "$url" ]; then
              continue
            fi

            if [ -d "$path" ] && [ -n "$(ls -A "$path" 2>/dev/null)" ]; then
              echo "Submodule path already populated: $path"
              continue
            fi

            resolved_url="$(resolve_url "$url")"
            echo "Cloning $path from $resolved_url"
            mkdir -p "$(dirname "$path")"
            rm -rf "$path"
            git -c protocol.version=2 clone --depth 1 --filter=blob:none "$resolved_url" "$path"
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$')

      - name: Select Xcode from versions.json
        shell: bash
        run: |
          set -euo pipefail
          XCODE_VERSION=$(python3 -c 'import json;print(json.load(open("versions.json"))["xcode"])')
          REQUESTED_XCODE="/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          if [ -d "$REQUESTED_XCODE" ]; then
            sudo xcode-select -s "$REQUESTED_XCODE"
          else
            echo "Requested Xcode_${XCODE_VERSION}.app not found, using currently selected runner default Xcode."
            xcode-select -p
          fi
          xcodebuild -version

      - name: Prepare canonical workspace path
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /Users/Shared
          cp -R "$GITHUB_WORKSPACE" /Users/Shared/
          mv "/Users/Shared/$(basename "$GITHUB_WORKSPACE")" /Users/Shared/telegram-ios

      - name: Build unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          AUTO_BUILD_NUMBER="$(($COMMIT_COUNT + $BUILD_NUMBER_OFFSET))"

          if [ -n "${{ inputs.build_number }}" ]; then
            BUILD_NUMBER="${{ inputs.build_number }}"
          else
            BUILD_NUMBER="$AUTO_BUILD_NUMBER"
          fi
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          BUILD_LOG="$OUTPUT_PATH/build.log"

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          set +e
          python3 -u build-system/Make/Make.py \
            --overrideBazelVersion \
            --overrideXcodeVersion \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" 2>&1 | tee "$BUILD_LOG"
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "Build failed with exit code $BUILD_EXIT"
            exit "$BUILD_EXIT"
          fi

          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/"
          done

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-build-log-${{ github.run_number }}
          path: /Users/Shared/telegram-ios/build/artifacts/build.log
          if-no-files-found: warn

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-unsigned-ipa-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
          if-no-files-found: error
